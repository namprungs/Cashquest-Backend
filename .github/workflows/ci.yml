name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  ci:
    name: Lint • Test • Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] # ตรงกับ .nvmrc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.18.3

      - name: Install deps (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test -- --ci --reporters=default --reporters=jest-junit
        env:
          CI: true

      - name: Upload JUnit (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: |
            junit.xml
          if-no-files-found: ignore

      - name: Coverage (text summary)
        run: pnpm run test:cov

      - name: Upload coverage folder
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: Build
        run: pnpm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
