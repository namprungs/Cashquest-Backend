name: Trigger auto deployment for cashquest-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/cashquest-backend-AutoDeployTrigger-b97e07fa-7450-4d9a-8324-31d388cf53da.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CASHQUESTBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CASHQUESTBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CASHQUESTBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: cashquest.azurecr.io
          registryUsername: ${{ secrets.CASHQUESTBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CASHQUESTBACKEND_REGISTRY_PASSWORD }}
          containerAppName: cashquest-backend
          resourceGroup: cashquest
          imageToBuild: cashquest.azurecr.io/cashquest-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


