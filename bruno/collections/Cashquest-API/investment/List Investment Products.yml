info:
  name: List Investment Products
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{termId}}/products"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
