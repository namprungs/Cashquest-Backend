info:
  name: Get Product
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{termId}}/products/{{productId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""
    - name: productId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
