info:
  name: List Economic Events
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{termId}}/events"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
