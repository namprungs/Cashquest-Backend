info:
  name: Create Order
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/market/terms/{{termId}}/orders"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "productId": "",
        "side": "BUY",
        "type": "MARKET",
        "units": 10
      }
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
