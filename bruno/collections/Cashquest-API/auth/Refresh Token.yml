info:
  name: Refresh Token
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "refreshToken": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
