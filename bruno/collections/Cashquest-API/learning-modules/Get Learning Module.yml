info:
  name: Get Learning Module
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/learning-modules/{{moduleId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: moduleId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
