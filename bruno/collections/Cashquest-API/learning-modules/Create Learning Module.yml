info:
  name: Create Learning Module
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/learning-modules"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "termId": "",
        "title": "Module 1",
        "description": "Introduction to Finance",
        "orderNo": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
