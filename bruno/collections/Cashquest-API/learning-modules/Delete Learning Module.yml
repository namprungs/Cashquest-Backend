info:
  name: Delete Learning Module
  type: http
  seq: 2

http:
  method: DELETE
  url: "{{baseUrl}}/learning-modules/{{moduleId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: moduleId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
