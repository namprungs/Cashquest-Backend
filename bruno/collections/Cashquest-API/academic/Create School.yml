info:
  name: Create School
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/academic/schools"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name": "Test School",
        "plan": "FREE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
