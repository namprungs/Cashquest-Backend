info:
  name: Complete Term
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/academic/terms/{{termId}}/complete"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
