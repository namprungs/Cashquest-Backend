info:
  name: Delete Term
  type: http
  seq: 7

http:
  method: DELETE
  url: "{{baseUrl}}/academic/terms/{{termId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
