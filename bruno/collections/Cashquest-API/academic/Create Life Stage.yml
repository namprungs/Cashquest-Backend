info:
  name: Create Life Stage
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/academic/life-stages"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name": "Career Starter",
        "orderNo": 1,
        "description": "Starting your career",
        "unlockInvestment": true,
        "enableRandomExpense": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
