info:
  name: List Term Stage Rules
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/academic/terms/{{termId}}/stage-rules"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
