info:
  name: Update Term
  type: http
  seq: 17

http:
  method: PATCH
  url: "{{baseUrl}}/academic/terms/{{termId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name": "Updated Term Name"
      }
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
