info:
  name: Get Term
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/academic/terms/{{termId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
