info:
  name: Withdraw from Savings
  type: http
  seq: 13

http:
  method: POST
  url: "{{baseUrl}}/savings-accounts/withdraw"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "savingsAccountId": "",
        "amount": 50
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
