info:
  name: Deposit to Savings
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/savings-accounts/deposit"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "savingsAccountId": "",
        "amount": 100
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
