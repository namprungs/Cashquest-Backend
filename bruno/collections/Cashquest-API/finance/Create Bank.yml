info:
  name: Create Bank
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/banks"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name": "CashQuest Bank",
        "termId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
