info:
  name: Update Bank
  type: http
  seq: 10

http:
  method: PUT
  url: "{{baseUrl}}/banks/{{bankId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name": "Updated Bank Name"
      }
  auth: inherit

runtime:
  variables:
    - name: bankId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
