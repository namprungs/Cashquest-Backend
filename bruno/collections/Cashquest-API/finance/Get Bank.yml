info:
  name: Get Bank
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/banks/{{bankId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: bankId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
