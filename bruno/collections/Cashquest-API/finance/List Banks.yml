info:
  name: List Banks
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/banks/term/{{termId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
