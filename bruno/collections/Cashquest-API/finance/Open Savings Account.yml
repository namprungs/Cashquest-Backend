info:
  name: Open Savings Account
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/savings-accounts/open"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "savingsAccountBankId": "",
        "studentProfileId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
