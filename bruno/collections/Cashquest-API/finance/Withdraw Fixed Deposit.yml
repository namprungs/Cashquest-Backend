info:
  name: Withdraw Fixed Deposit
  type: http
  seq: 12

http:
  method: POST
  url: "{{baseUrl}}/fixed-deposits/withdraw"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "fixedDepositId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
