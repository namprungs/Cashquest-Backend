info:
  name: Get Expense History
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/expenses/history"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: termId
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
