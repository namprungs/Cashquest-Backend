info:
  name: Pay Expense
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/expenses/pay"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "expenseId": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
