info:
  name: Get Submission Detail
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/quests/submissions/{{submissionId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: submissionId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
