info:
  name: Get My Submission Status
  type: http
  seq: 12

http:
  method: GET
  url: "{{baseUrl}}/quests/{{questId}}/submissions/me/status"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: questId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
