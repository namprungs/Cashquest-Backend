info:
  name: Get Quest
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/quests/{{questId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: questId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
