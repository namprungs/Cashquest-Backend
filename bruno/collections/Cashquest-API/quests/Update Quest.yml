info:
  name: Update Quest
  type: http
  seq: 19

http:
  method: PUT
  url: "{{baseUrl}}/quests/{{questId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "title": "Updated Quest Title",
        "rewardCoins": 150
      }
  auth: inherit

runtime:
  variables:
    - name: questId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
