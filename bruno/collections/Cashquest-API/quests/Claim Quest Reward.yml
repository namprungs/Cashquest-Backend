info:
  name: Claim Quest Reward
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/quests/{{questId}}/claim"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: questId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
