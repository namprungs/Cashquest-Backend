info:
  name: Approve Submission
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/quests/submissions/{{submissionId}}/approve"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "questionReviews": []
      }
  auth: inherit

runtime:
  variables:
    - name: submissionId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
