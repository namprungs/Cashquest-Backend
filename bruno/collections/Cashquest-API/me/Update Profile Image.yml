info:
  name: Update Profile Image
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/me/profile-image"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "profileImageUrl": "https://example.com/avatar.png"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
