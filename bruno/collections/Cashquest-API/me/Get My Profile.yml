info:
  name: Get My Profile
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/me/profile"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: termId
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
