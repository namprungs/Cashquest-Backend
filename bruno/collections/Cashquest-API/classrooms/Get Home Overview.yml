info:
  name: Get Home Overview
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/academic/classrooms/{{id}}/home-overview"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: id
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
