info:
  name: List Classrooms
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/academic/terms/{{termId}}/classrooms"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
