info:
  name: Get Classroom Pending Submissions
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/academic/classrooms/{{classroomId}}/pending-submissions"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: classroomId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
