info:
  name: List Students
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/player/terms/{{termId}}/students"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
