info:
  name: Assign School
  type: http
  seq: 1

http:
  method: PATCH
  url: "{{baseUrl}}/users/{{id}}/school"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "schoolId": ""
      }
  auth: inherit

runtime:
  variables:
    - name: id
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
