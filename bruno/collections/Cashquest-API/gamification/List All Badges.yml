info:
  name: List All Badges
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/badges/terms/{{termId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: termId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
