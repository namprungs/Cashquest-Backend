info:
  name: Get Quiz
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/quizzes/{{quizId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: quizId
      value: ""

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
