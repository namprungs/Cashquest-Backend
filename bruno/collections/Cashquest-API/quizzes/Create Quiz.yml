info:
  name: Create Quiz
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/quizzes"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "moduleId": "",
        "questions": [
      }
                  {
                      "questionText": "What is 2+2?",
                      "questionType": "SINGLE_CHOICE",
                      "orderNo": 1,
                      "points": 1,
                      "gradingType": "AUTO",
                      "choices": [
                          { "choiceText": "3", "isCorrect": false, "orderNo": 1 },
                          { "choiceText": "4", "isCorrect": true, "orderNo": 2 }
                      ]
                  }
              ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
