info:
  name: List Student Profiles by Term
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/player/terms/{{termId}}/students"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
