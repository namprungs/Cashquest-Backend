info:
  name: Get Retirement Goal by ID
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/player/terms/{{termId}}/retirement-goals/{{retirementGoalId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
