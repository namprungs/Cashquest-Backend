info:
  name: Get Student Profile by ID
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/player/students/{{studentProfileId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
