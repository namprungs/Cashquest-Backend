info:
  name: Approve Submission (Teacher)
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/quests/submissions/{{submissionId}}/approve"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "expectedUpdatedAt": "{{expectedUpdatedAt}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
