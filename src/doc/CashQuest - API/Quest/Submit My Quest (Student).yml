info:
  name: Submit My Quest (Student)
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}/quests/{{questId}}/submissions/me"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "payloadJson": {
          "text": "my assignment answer"
        },
        "attachmentUrl": "https://example.com/file.pdf",
        "expectedLatestVersionNo": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
