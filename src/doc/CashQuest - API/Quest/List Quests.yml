info:
  name: List Quests
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/quests?termId={{termId}}&status=PUBLISHED&type=QUIZ&search=weekly"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: termId
      value: "{{termId}}"
      type: query
    - name: status
      value: PUBLISHED
      type: query
    - name: type
      value: QUIZ
      type: query
    - name: search
      value: weekly
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
