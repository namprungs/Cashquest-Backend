info:
  name: Get My Quest Detail (Student)
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/quests/{{questId}}/me"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
