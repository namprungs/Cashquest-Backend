info:
  name: Award Badge To Student Profile (Admin)
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/badges/terms/{{termId}}/{{badgeId}}/award"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "studentProfileId": "{{studentProfileId}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
