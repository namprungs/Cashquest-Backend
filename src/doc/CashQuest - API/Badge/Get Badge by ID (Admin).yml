info:
  name: Get Badge by ID (Admin)
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/badges/terms/{{termId}}/{{badgeId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
