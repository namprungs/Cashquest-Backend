info:
  name: Delete Badge (Admin)
  type: http
  seq: 5

http:
  method: DELETE
  url: "{{baseUrl}}/badges/terms/{{termId}}/{{badgeId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
