info:
  name: List Badges (Player)
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/player/terms/{{termId}}/badges?limit={{limit}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
