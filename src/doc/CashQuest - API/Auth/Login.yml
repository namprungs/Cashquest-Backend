info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
