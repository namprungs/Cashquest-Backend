info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{devurl}}/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: inherit

runtime:
  variables:
    - name: devurl
      value: https://cashquest-backend-6z9b8.ondigitalocean.app

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
