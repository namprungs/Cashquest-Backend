info:
  name: List Quizzes
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/quizzes?termId={{termId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: termId
      value: "{{termId}}"
      type: query
    - name: moduleId
      value: "{{moduleId}}"
      type: query
      disabled: true
    - name: search
      value: math
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
