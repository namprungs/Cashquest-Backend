info:
  name: Submit Attempt (Student)
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/attempts/{{attemptId}}/submit"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "answers": [
          {
            "questionId": "<question-single-choice-id>",
            "selectedChoiceIds": ["<choice-correct-id>"]
          },
          {
            "questionId": "<question-short-text-id>",
            "answerText": "Bangkok"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
