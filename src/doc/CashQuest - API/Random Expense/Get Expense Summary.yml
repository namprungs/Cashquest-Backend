info:
  name: Get Expense Summary
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/expenses/summary?termId={{termId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: termId
      value: "{{termId}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
