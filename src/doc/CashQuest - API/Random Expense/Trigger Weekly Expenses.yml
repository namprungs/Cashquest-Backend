info:
  name: Trigger Weekly Expenses
  type: http
  seq: 11

http:
  method: POST
  url: "{{baseUrl}}/expenses/trigger"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "termId": "{{termId}}",
        "weekNo": null
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
