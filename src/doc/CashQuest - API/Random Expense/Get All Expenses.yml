info:
  name: Get All Expenses
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/expenses/all?termId={{termId}}&page=1&limit=20"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: termId
      value: "{{termId}}"
      type: query
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
