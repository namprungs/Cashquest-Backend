info:
  name: Acknowledge All Expenses
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/expenses/acknowledge-all"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "termId": "{{termId}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
