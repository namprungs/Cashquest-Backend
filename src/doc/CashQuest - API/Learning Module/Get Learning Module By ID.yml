info:
  name: Get Learning Module By ID
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/learning-modules/{{moduleId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
