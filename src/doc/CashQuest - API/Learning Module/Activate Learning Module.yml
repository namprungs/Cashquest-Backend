info:
  name: Activate Learning Module
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseUrl}}/learning-modules/{{moduleId}}/activate"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
