info:
  name: Update Learning Module
  type: http
  seq: 2

http:
  method: PUT
  url: "{{baseUrl}}/learning-modules/{{moduleId}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "title": "Module 1 Updated",
        "orderNo": 2
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
