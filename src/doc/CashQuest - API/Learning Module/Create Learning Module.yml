info:
  name: Create Learning Module
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/learning-modules"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "termId": "{{termId}}",
        "title": "Module 1",
        "description": "Intro to finance",
        "contentUrl": "https://example.com/module-1",
        "orderNo": 1,
        "isActive": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
