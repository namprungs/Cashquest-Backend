info:
  name: List Learning Modules
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/learning-modules?termId={{termId}}&isActive=true&search=intro"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: termId
      value: "{{termId}}"
      type: query
    - name: isActive
      value: "true"
      type: query
    - name: search
      value: intro
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
