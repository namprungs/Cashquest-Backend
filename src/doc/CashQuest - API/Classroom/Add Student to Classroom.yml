info:
  name: Add Student to Classroom
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/academic/classrooms/{{classroomId}}/students"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "studentId": "{{studentId}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
