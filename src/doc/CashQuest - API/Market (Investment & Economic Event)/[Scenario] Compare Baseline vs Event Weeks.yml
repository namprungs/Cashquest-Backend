info:
  name: "[Scenario] Compare Baseline vs Event Weeks"
  type: http
  seq: 32

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/products/{{productId}}/prices?fromWeek=300&toWeek=301"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: fromWeek
      value: "300"
      type: query
    - name: toWeek
      value: "301"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
