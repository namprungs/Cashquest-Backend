info:
  name: "[Scenario] Attach Event To Week"
  type: http
  seq: 30

http:
  method: POST
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/term-events"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "eventId": "{{economicEventId}}",
        "startWeek": 301,
        "endWeek": 301,
        "status": "ACTIVE",
        "customImpact": {
          "muAdjustment": -0.08,
          "sigmaAdjustment": 0.12,
          "sigmaMultiplier": 1.8
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
