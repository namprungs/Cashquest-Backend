info:
  name: List My Bonds
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/bonds/me"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
