info:
  name: List My Dividends
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/dividends/me"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
