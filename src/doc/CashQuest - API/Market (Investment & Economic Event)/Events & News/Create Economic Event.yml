info:
  name: Create Economic Event
  type: http
  seq: 22

http:
  method: POST
  url: "{{baseUrl}}/market/economic-events"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "title": "น้ำปรุงขึ้นภาษี",
        "description": "Energy shock",
        "eventType": "VOLATILITY_SHOCK",
        "defaultImpact": {
          "muAdjustment": -0.03,
          "sigmaAdjustment": 0.07,
          "sigmaMultiplier": 1.2
        },
        "isRepeatable": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
