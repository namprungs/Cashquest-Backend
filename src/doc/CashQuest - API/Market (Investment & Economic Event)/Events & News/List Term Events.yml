info:
  name: List Term Events
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/events?limit=20&includeUpcoming=false&includePast=true&publishedOnly=true&sort=desc"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: weekNo
      value: ""
      type: query
    - name: limit
      value: "20"
      type: query
    - name: includeUpcoming
      value: "false"
      type: query
    - name: includePast
      value: "true"
      type: query
    - name: publishedOnly
      value: "true"
      type: query
    - name: statuses
      value: ""
      type: query
    - name: sort
      value: "desc"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
