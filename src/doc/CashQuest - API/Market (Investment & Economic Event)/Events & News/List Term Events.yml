info:
  name: List Term Events
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/events?limit=30&includePast=true&statuses=ACTIVE"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: limit
      value: "30"
      type: query
    - name: includeUpcoming
      value: "false"
      type: query
      disabled: true
    - name: includePast
      value: "true"
      type: query
    - name: publishedOnly
      value: "false"
      type: query
      disabled: true
    - name: statuses
      value: ACTIVE
      type: query
    - name: includeUpcoming
      value: "true"
      type: query
      disabled: true
    - name: includePast
      value: "true"
      type: query
      disabled: true
    - name: publishedOnly
      value: "false"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
