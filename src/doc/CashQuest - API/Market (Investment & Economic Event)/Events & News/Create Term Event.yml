info:
  name: Create Term Event
  type: http
  seq: 24

http:
  method: POST
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/term-events"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "eventId": "{{economicEventId}}",
        "startWeek": 200,
        "endWeek": 220,
        "status": "SCHEDULED"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
