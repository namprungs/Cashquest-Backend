info:
  name: Upsert Product Simulations
  type: http
  seq: 15

http:
  method: POST
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/simulations"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "items": [
          {
            "productId": "{{productId}}",
            "initialPrice": 100,
            "mu": 0.1,
            "sigma": 0.2,
            "dt": 0.00274
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
