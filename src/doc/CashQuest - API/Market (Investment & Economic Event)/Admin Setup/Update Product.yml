info:
  name: Update Product
  type: http
  seq: 13

http:
  method: PATCH
  url: "{{baseUrl}}/market/products/{{productId}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name": "CashQuest Tech Growth Updated",
        "sector": "TECH"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
