info:
  name: Upsert Term Simulation
  type: http
  seq: 16

http:
  method: POST
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/term-simulation"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "randomSeed": 20260301,
        "currentWeek": 180,
        "engineVersion": "v1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
