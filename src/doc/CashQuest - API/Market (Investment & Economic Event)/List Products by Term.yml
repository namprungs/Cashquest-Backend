info:
  name: List Products by Term
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/products"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
