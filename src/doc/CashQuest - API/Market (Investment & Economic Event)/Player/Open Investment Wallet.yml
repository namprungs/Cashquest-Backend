http:
  method: POST
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/investment-wallet/open"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
