info:
  name: Get My Portfolio
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/portfolio/me"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
