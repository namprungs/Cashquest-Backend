info:
  name: List Products by Term
  type: http
  seq: 1

http:
  method: GET
  url: "{{devurl}}/market/terms/{{marketTermId}}/products"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

runtime:
  variables:
    - name: devurl
      value: https://cashquest-backend.politeriver-a75760f4.centralindia.azurecontainerapps.io

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
