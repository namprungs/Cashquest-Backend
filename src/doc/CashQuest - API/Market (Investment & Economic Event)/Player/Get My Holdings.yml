info:
  name: Get My Holdings
  type: http
  seq: 5

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/holdings/me"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
