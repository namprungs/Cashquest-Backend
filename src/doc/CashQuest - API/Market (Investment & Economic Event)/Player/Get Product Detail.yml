info:
  name: Get Product Detail
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/products/{{productId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
