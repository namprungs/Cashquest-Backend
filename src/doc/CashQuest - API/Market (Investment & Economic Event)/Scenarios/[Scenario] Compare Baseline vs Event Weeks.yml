info:
  name: "[Scenario] Compare Baseline vs Event Weeks"
  type: http
  seq: 32

http:
  method: GET
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/products/{{productId}}/prices?range=5d"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: range
      value: 5d
      type: query
    - name: fromWeek
      value: "300"
      type: query
      disabled: true
    - name: toWeek
      value: "301"
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
