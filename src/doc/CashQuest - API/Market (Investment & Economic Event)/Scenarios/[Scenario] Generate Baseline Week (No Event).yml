info:
  name: "[Scenario] Generate Baseline Week (No Event)"
  type: http
  seq: 28

http:
  method: POST
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/prices/generate-week"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "weekNo": 300,
        "productIds": ["{{productId}}"],
        "moveCurrentWeekToNext": false
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
