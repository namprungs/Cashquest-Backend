info:
  name: Process Payouts (Job)
  type: http
  seq: 34

http:
  method: POST
  url: "{{baseUrl}}/market/terms/{{marketTermId}}/jobs/payouts"
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "weekNo":6
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
