info:
  name: List Savings Accounts by Bank
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/savings-accounts/bank/{{bankId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
