info:
  name: Get Wallet Transaction History
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/wallets/{{walletId}}/transactions?page={{page}}&limit={{limit}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  params:
    - name: page
      value: "{{page}}"
      type: query
    - name: limit
      value: "{{limit}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
