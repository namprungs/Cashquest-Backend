info:
  name: List Savings Accounts by Student
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/savings-accounts/student/{{studentProfileId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
