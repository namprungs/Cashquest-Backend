info:
  name: Create Saving Account Bank
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/banks/{{bankId}}/savings-config"
  body:
    type: json
    data: |-
      { "interestRate": "4", 
        "withdrawLimitPerTerm": "2000", 
        "feePerTransaction": "0"}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
