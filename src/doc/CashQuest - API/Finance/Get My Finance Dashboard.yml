info:
  name: Get My Finance Dashboard
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/me/finance?termId={{termId}}"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
