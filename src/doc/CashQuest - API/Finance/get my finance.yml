info:
  name: get my finance
  type: http
  seq: 12

http:
  method: GET
  url: '"{{baseUrl}}/me/finance?termId={{termId}}&limit={{limit}}"'
  params:
    - name: termId
      value: "{{termId}}"
      type: query
    - name: limit
      value: '{{limit}}"'
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
