info:
  name: Deposit Funds
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/savings-accounts/deposit"
  body:
    type: json
    data: |-
      {
        "savingsAccountId": "{{savingsAccountId}}",
        "amount": 500.00
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
