info:
  name: Open Student Account
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/savings-accounts/open"
  body:
    type: json
    data: |-
      {
        "studentProfileId": "{{studentProfileId}}",
        "savingsAccountBankId": "{{savingsAccountBankId}}",
        "initialDeposit": 1000.00
      }
  auth: inherit

runtime:
  variables:
    - name: savingsAccountBankId
      value: fbb078ed-5e9f-42ac-8176-514863af564b

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
