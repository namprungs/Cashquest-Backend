info:
  name: Withdraw Funds
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/savings-accounts/withdraw"
  body:
    type: json
    data: |-
      {
        "savingsAccountId": "{{savingsAccountId}}",
        "amount": 200.00
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
