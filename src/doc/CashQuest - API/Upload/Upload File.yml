info:
  name: Upload File
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/upload"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - /Users/torrak.c/Downloads/cpi.png
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
